baseURL = "http://lamg.github.io/"
languageCode = "en-us"
title = "LAMG's personal blog"
theme = "devise"
relativeURLs = true
enableEmoji = true
googleAnalytics = ""
enableRobotsTXT = true
copyright = "© 2020 Luis Ángel Méndez Gort"

publishDir = "docs"

# Main menu items
[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    title = "About"
    url = "/about/"
    weight = -110
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    title = "Posts"
    url = "/post/"
    weight = -100
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    title = "Categories"
    url = "/categories/"
    weight = -90

# Configuration Features
[params]
  header_title = "Luis Ángel Méndez Gort"                 # Your header title
  header_subtitle = "Programming without errors and pedantry" # Your header subtitle
  home_image = "/images/lamg.png"          # Path to header image starting from the static directory
  recent_posts = 5                           # Max amount of recent posts to show
  mainSections = ["posts", "post", "blog"]   # Main sections to include in recent posts
  [[params.social]]
    fa_icon = "fab fa-github fa-1x"          # Font Awesome icon class
    href = "https://github.com/lamg"      # Link to associate with icon (http://, https://, mailto:)
  [[params.social]]
    fa_icon = "fab fa-linkedin-in fa-1x"
    href = "https://www.linkedin.com/in/luis-%C3%A1ngel-m%C3%A9ndez-gort-44b09ab9/"
  [[params.social]]
    fa_icon = "fab fa-twitter fa-1x"
    href = "https://twitter.com/LAMG_0"
  [[params.social]]
    fa_icon = "fas fa-at fa-1x"
    href = "mailto:gort.andres000@gmail.com"
